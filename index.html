<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Profissão do Futuro - Colégio KNOW</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="inicio" class="card">
            <h1>Profissão do Futuro</h1>
            <p> Descubra qual curso do Colégio KNOW combina mais com você! </p> <button id="btnIniciar">Iniciar
                Quiz</button>
        </div>
        <div id="quiz" class="card oculto">
            <h2 id="pergunta"></h2>
            <div class="alternativas"> <button class="alternativa" data-resposta="A"></button> <button
                    class="alternativa" data-resposta="B"></button> <button class="alternativa"
                    data-resposta="C"></button> </div>
            <p id="contador"></p>
        </div>
        <div id="resultado" class="card oculto">
            <h2>Resultado Final</h2>
            <h3 id="cursoResultado"></h3>
            <p id="textoResultado"></p> <button onclick="reiniciarQuiz()"> Refazer Quiz </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Profissão do Futuro</title>

  <link rel="stylesheet" href="assets/css/quiz.css">
</head>
<body>

  <div class="container">

    <div class="quiz-box">

      <h1>🚀 Profissão do Futuro</h1>

      <div id="start-screen">
        <p>
          Descubra qual curso do Colégio KNOW combina com você.
        </p>

        <button id="start-btn">
          Iniciar Quiz
        </button>
      </div>

      <div id="quiz-screen" class="hidden">

        <h2 id="question"></h2>

        <div class="answers">
          <button class="answer-btn" data-option="A"></button>
          <button class="answer-btn" data-option="B"></button>
          <button class="answer-btn" data-option="C"></button>
        </div>

        <p id="progress"></p>

      </div>

      <div id="result-screen" class="hidden">

        <h2>Resultado Final</h2>

        <p id="result-text"></p>

        <button onclick="location.reload()">
          Refazer Quiz
        </button>

      </div>

    </div>

  </div>

  <script src="assets/js/quiz.js"></script>
</body>
</html>

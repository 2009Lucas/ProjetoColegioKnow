<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Admin</title>

    <link rel="stylesheet" href="assets/css/admin.css">
</head>

<body>

    <div class="admin-box">

        <h1>📋 Painel Administrativo</h1>

        <input type="text" id="search" placeholder="Pesquisar aluno...">
        
        <button id="clear">
            Limpar Dados
        </button>

        <table>

            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Email</th>
                    <th>Curso</th>
                </tr>
            </thead>

            <tbody id="table-body"></tbody>

        </table>

    </div>

    <script src="assets/js/admin.js"></script>
</body>

</html>
